services:
  postgres:
    image: postgres:16-alpine
    container_name: paper-vine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paper_vine_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paper_vine_shop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
